<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Halloween Countdown</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="src/calabaza.png">
</head>

<body>

    <div class="fondo"></div>

    <nav class="navbar">
        <img src="src/titulo.png" alt="Logo" class="navbar-logo">
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="itinerario.html">Itinerario</a></li>
            <li><a href="wiki.html">Wiki</a></li>
        </ul>
    </nav>

    <div class="titulo-container">
        <img src="src/titulo.png" alt="Título" class="titulo">
        <p class="subtitulo">FALTAN PARA HALLOWEEN</p>

        <div class="contador">
            <div class="frame" style="background-image: url('src/frame.png');">
                <div class="frame-contenido">
                    <span class="numero" id="dias">00</span>
                    <span class="etiqueta">Días</span>
                </div>
            </div>
            <div class="frame" style="background-image: url('src/frame.png');">
                <div class="frame-contenido">
                    <span class="numero" id="horas">00</span>
                    <span class="etiqueta">Horas</span>
                </div>
            </div>
            <div class="frame" style="background-image: url('src/frame.png');">
                <div class="frame-contenido">
                    <span class="numero" id="minutos">00</span>
                    <span class="etiqueta">Minutos</span>
                </div>
            </div>
            <div class="frame" style="background-image: url('src/frame.png');">
                <div class="frame-contenido">
                    <span class="numero" id="segundos">00</span>
                    <span class="etiqueta">Segundos</span>
                </div>
            </div>
        </div>

        <a href="itinerario.html" class="btn-itinerario">Ver Itinerario &gt;</a>
    </div>

    <script src="script.js"></script>
    <footer class="footer">
        <p class="footer-copyright">&copy; 2026 Requiem Of The Damned.</p>
    </footer>

</body>

</html>
